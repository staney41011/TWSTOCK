name: Daily Stock Scan

on:
  # 1. 每天早上 06:00 (UTC+8) 自動執行 -> 只跑 main.py
  schedule:
    - cron: '0 22 * * 1-5'
  
  # 2. 手動觸發 -> 提供選項讓您決定要不要跑 Backfill
  workflow_dispatch:
    inputs:
      run_backfill:
        description: '是否要執行歷史回補 (Backfill)? (耗時較久，僅在修改策略後使用)'
        required: false
        type: boolean
        default: false
      run_holy_grail_only:
        description: '只重新產生台股聖杯雷達與美股產業對應資料'
        required: false
        type: boolean
        default: false
      target_date:
        description: '手動重跑日期，格式 YYYY-MM-DD；空白時使用 data.json 最新日期'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Strategy Script
      run: |
        TARGET_DATE="${{ github.event.inputs.target_date }}"
        if [ "${{ github.event.inputs.run_holy_grail_only }}" == "true" ]; then
            echo "偵測到聖杯雷達重跑指令：啟動 rerun_holy_grail.py ..."
            if [ -n "$TARGET_DATE" ]; then
                python rerun_holy_grail.py --date "$TARGET_DATE"
            else
                python rerun_holy_grail.py
            fi
        elif [ "${{ github.event.inputs.run_backfill }}" == "true" ]; then
            echo "偵測到回補指令：啟動 backfill.py ..."
            if [ -f "backfill.py" ]; then
                python backfill.py
            else
                echo "❌ 找不到 backfill.py，請確認檔案已上傳。"
                exit 1
            fi
        else
            echo "⚡ 執行標準每日掃描：啟動 main.py ..."
            python main.py
        fi

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git fetch origin main
        git reset --soft origin/main
        
        # 加入所有可能的變更 (包含新產生的 json 和 python 修改)
        git add .
        
        # 提交 (如果沒變更則略過)
        git commit -m "Auto update stock data [skip ci]" || exit 0
        git push origin main
